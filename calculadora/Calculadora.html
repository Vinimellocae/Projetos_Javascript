<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculadora</title>
</head>
<body>
    <h1>Calculadora</h1>

    <div class="Container">
        <div class="visor">
            <p>0</p>
        </div>

        <button class="operador">AC</button>
        <button class="operador">←</button>
        <button class="operador">/</button>
        <button class="operador">*</button>
        
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="operador">-</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="operador">+</button>
        
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="igual">=</button>

        <button class="zero">0</button>
        <button>,</button>
        
    </div>
</body>

<script src="calc.js"></script>
</html>
